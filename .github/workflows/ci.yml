name: CI

on:
  workflow_dispatch:
  # Auto-triggers disabled during dev to conserve GitHub Actions minutes.
  # The orchestrator dispatches this workflow at every phase gate.
  # Re-enable before release (P9):
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

# Least privilege: CI only reads the repo (no writes to contents, packages, etc.).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust gates + wasm build + cross-target hash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: |
          set -o pipefail
          cargo fmt --check

      - name: Clippy (native)
        run: |
          set -o pipefail
          cargo clippy --all-targets -- -D warnings

      - name: Clippy (wasm32 — lints the wasm-bindgen boundary in src/api.rs)
        run: |
          set -o pipefail
          cargo clippy --target wasm32-unknown-unknown -- -D warnings

      - name: Test (native — engine core is wasm-free; incl. golden harness, determinism, FSM, numeric-literal lint, double-validation)
        run: |
          set -o pipefail
          cargo test

      - name: Perf + size budgets (RELEASE — the <500 ms / <200 KB acceptance numbers are release metrics)
        run: |
          set -o pipefail
          cargo test --release --test mc_budget

      - name: Install wasm-pack (prebuilt binary; backlog B8 — no from-source compile)
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: npm ci (source for the vendored Chart.js bundle + ajv for the cross-target test)
        run: |
          set -o pipefail
          npm ci

      - name: Build site via scripts/build.sh (proves the one true build path in CI)
        run: |
          set -o pipefail
          bash scripts/build.sh

      - name: Assert wasm binary present and pkg/.gitignore deleted (PREMORTEM T2)
        run: |
          set -o pipefail
          test -f www/pkg/eigenorg_bg.wasm
          test ! -f www/pkg/.gitignore
          test -f www/vendor/chart.umd.min.js
          test -f www/.nojekyll

      - name: Vendor pin drift (backlog B2 — build.sh must not change the committed www/vendor/)
        run: |
          set -o pipefail
          git diff --exit-code -- www/vendor/

      - name: External-request grep against the BUILT www/ (backlog B1 — covers pkg/ + vendor/, protocol-relative + import()/Worker())
        run: |
          set -o pipefail
          bash scripts/check_no_external_requests.sh www

      - name: Cross-target output hash + worker protocol — wasm half (loads the built wasm; hash == committed native hash; worker.js handler driven for real)
        run: |
          set -o pipefail
          node --test www/js/tests/cross-target-hash.test.mjs www/js/tests/worker.test.mjs

  js:
    name: JS gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: npm ci
        run: |
          set -o pipefail
          npm ci

      - name: Lint
        run: |
          set -o pipefail
          npm run lint

      - name: Typecheck
        run: |
          set -o pipefail
          npm run typecheck

      - name: modelVersion <-> extracted-artifact hash pairing (MODEL.md §12.6)
        run: |
          set -o pipefail
          node scripts/check_version_pairing.mjs

      - name: node --test (discovery matches *.test.{js,mjs}; backlog B5 — cross-target-hash skips here without a wasm build, runs for real in the rust job)
        run: |
          set -o pipefail
          if find . -path ./node_modules -prune -o -type f \( -name "*.test.js" -o -name "*.test.mjs" \) -print -quit | grep -q .; then
            npm test
          else
            echo "no JS test files yet — skipping"
          fi

      - name: Drift gate — extractor idempotence + no untracked outputs (backlog B7)
        run: |
          set -o pipefail
          if [ -f scripts/extract_params.mjs ]; then
            node scripts/extract_params.mjs
            git diff --exit-code -- model/ www/assumptions.json
            test -z "$(git status --porcelain model/ www/assumptions.json)" || { echo 'FAIL: extractor produced untracked outputs'; git status --porcelain model/ www/assumptions.json; exit 1; }
          else
            echo "scripts/extract_params.mjs not present yet — skipping drift gate"
          fi

      - name: External-request grep against the www/ source (binding delta #2; allowlist nothing)
        run: |
          set -o pipefail
          bash scripts/check_no_external_requests.sh www

      - name: UI-thread wasm isolation — only www/js/worker.js imports www/pkg (PLAN P5 gate; node tests excluded, they run off-page)
        run: |
          set -o pipefail
          bash scripts/check_pkg_import_isolation.sh

      - name: Coefficient-literal gate — no hand-typed model coefficients in www/js (PLAN Gate-ownership; P8-owned; PREMORTEM Story 3)
        run: |
          set -o pipefail
          node scripts/check_no_coefficient_literals.mjs
